name: 'energy_pipeline'
version: '1.0.0'
config-version: 2

profile: 'energy_pipeline'

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

dispatch:
  - macro_namespace: dbt
    search_order: ['energy_pipeline', 'dbt']

on-run-start:
  - "USE CATALOG energy"

models:
  energy_pipeline:
    +persist_docs:
      relation: true
      columns: true
    staging:
      +materialized: view
      +schema: staging
      +database: energy
    intermediate:
      +materialized: view
      +schema: intermediate
      +database: energy
    marts:
      +materialized: table
      +schema: gold
      +database: energy